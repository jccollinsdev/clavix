services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/apns:/app/apns:ro
    restart: unless-stopped
    networks:
      - clavis-network

networks:
  clavis-network:
    driver: bridge
