name: Clavis
options:
  bundleIdPrefix: com.clavisdev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "14.0"
  generateEmptyDirectories: true

fileGroups:
  - Clavis/Config

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Clavis/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.clavisdev.portfolioassistant

targets:
  Clavis:
    type: application
    platform: iOS
    sources:
      - path: Clavis
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Clavis/Resources/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.clavisdev.portfolioassistant
    configFiles:
      Debug: Clavis/Config/Secrets.xcconfig
      Release: Clavis/Config/Secrets.xcconfig
    resources:
      - path: Clavis/Resources/Fonts
      - path: Clavis/Resources/Design
      - path: Clavis/Resources/PrivacyInfo.xcprivacy
    dependencies:
      - package: Supabase
  ClavisTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: Clavis
    sources:
      - path: ClavisTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.clavisdev.portfolioassistant.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Clavis

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
