name: Clavis
options:
  bundleIdPrefix: com.clavisdev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Clavis/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.clavisdev.portfolioassistant

targets:
  Clavis:
    type: application
    platform: iOS
    sources:
      - path: Clavis
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Clavis/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.clavisdev.portfolioassistant
    resources:
      - path: Clavis/Resources/Fonts
    dependencies:
      - package: Supabase

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
