services:
  - type: web
    name: clavis-web
    runtime: static
    staticPublishPath: ./web
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /confirm
        destination: /confirm.html

  - type: web
    name: clavis-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8000
      - key: APNS_KEY_PATH
        value: /etc/secrets/apns.p8
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_BASE_URL
        sync: false
      - key: MIROFISH_URL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_BUNDLE_ID
        sync: false
